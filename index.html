<!DOCTYPE html>
<html>
<head>
<title>Spotify Login (PKCE)</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:40vh;font-size:30px;font-family:sans-serif;">
<div id="content">Initializing...</div>

<script>

// --- CONFIG ---
const clientId = "3caeb60e0d5a4b44a1db78653383f390";
const redirectUri = "https://nanachiiiiii.github.io/standalone-quest-vrc-chatbox-spotify-display/settings.html";
const scopes = "user-read-currently-playing";

// --- HELPERS ---
// generate random string
function randomString(length) {
  let text = "";
  const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
  for (let i = 0; i < length; i++) {
    text += possible.charAt(Math.floor(Math.random() * possible.length));
  }
  return text;
}

// base64-url encode
function base64urlEncode(str) {
  return btoa(str)
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

// SHA256 hash
async function sha256(str) {
  const buf = new TextEncoder().encode(str);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return new Uint8Array(hash);
}

// --- PKCE SETUP ---
const verifier = randomString(128);
localStorage.setItem("pkce_verifier", verifier);

sha256(verifier).then(hashed => {
  const challenge = base64urlEncode(String.fromCharCode.apply(null, hashed));

  const authUrl = 
    "https://accounts.spotify.com/authorize" +
    "?response_type=code" +
    "&client_id=" + encodeURIComponent(clientId) +
    "&scope=" + encodeURIComponent(scopes) +
    "&redirect_uri=" + encodeURIComponent(redirectUri) +
    "&code_challenge_method=S256" +
    "&code_challenge=" + encodeURIComponent(challenge);

  document.getElementById("content").innerHTML =
    "<a href='" + authUrl + "' style='color:white;font-size:40px;'>Login with Spotify</a>";
});

</script>

</body>
</html>
