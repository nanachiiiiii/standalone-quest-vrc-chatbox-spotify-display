<!DOCTYPE html>
<html>
<head>
<title>Spotify Now Playing</title>
</head>
<body style="background:black;color:white;font-family:sans-serif;text-align:center;margin-top:10vh;font-size:30px">

<h1>Spotify Now Playing</h1>
<div id="song">Loading...</div>

<div style="margin-top:20px;">
  Refresh interval (ms): <input type="number" id="refresh" value="3000">
  <button id="relogin" style="margin-left:10px;">Log Out / Re-login</button>
</div>

<script>
// Parse token from URL hash
function parseToken() {
    const hash = window.location.hash;
    if (!hash) return null;
    return hash.substring(1).split("&")[0].split("=")[1];
}

let token = parseToken();

// If no token, redirect to login page automatically
if (!token) {
    window.location.href = "https://nanachiiiiii.github.io/standalone-quest-vrc-chatbox-spotify-display/index.html";
}

// Update currently playing song
async function updateSong() {
    if (!token) return;
    const r = await fetch(
        "https://api.spotify.com/v1/me/player/currently-playing",
        { headers: { Authorization: "Bearer " + token } }
    );
    if (r.status === 204) return; // nothing playing
    if (!r.ok) return; // error
    const data = await r.json();
    const name = data.item.name;
    const artist = data.item.artists[0].name;
    document.getElementById("song").innerText = "Now Playing: " + name + " - " + artist;
}

// Start updating at chosen interval
let intervalId;
function startUpdates() {
    clearInterval(intervalId);
    const interval = parseInt(document.getElementById("refresh").value);
    intervalId = setInterval(updateSong, interval);
    updateSong();
}

// Initial update
startUpdates();

// Update interval dynamically
document.getElementById("refresh").addEventListener("change", startUpdates);

// Log out / re-login button
document.getElementById("relogin").addEventListener("click", () => {
    window.location.href = "https://nanachiiiiii.github.io/standalone-quest-vrc-chatbox-spotify-display/index.html";
});
</script>

</body>
</html>
